services:
  prompts-microservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prompts-microservice
    ports:
      - "${PORT:-4750}:${CONTAINER_PORT:-3000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${CONTAINER_PORT:-3000}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
