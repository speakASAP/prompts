services:
  prompts-microservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prompts-microservice-green
    ports:
      - "${PORT_GREEN:-4751}:${CONTAINER_PORT:-3000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${CONTAINER_PORT:-3000}
    networks:
      - nginx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  nginx-network:
    external: true
    name: ${NGINX_NETWORK_NAME:-nginx-network}
